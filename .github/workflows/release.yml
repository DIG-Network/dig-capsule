# On merge to the default branch: regenerate CHANGELOG.md from Conventional Commits (git-cliff),
# commit it to the default branch, THEN tag that commit vX.Y.Z and push the tag. The changelog is
# therefore INCLUDED in the tag. The pushed tag triggers this repo's deploy/release workflow
# (wired `on: push: tags: ['v*']`).
#
# The tag is pushed with RELEASE_TOKEN (a PAT) — a tag pushed by the default GITHUB_TOKEN does NOT
# trigger downstream workflows (GitHub anti-recursion), which would break deploy-on-tag. The same
# PAT pushes the changelog commit (its identity must be allowed past branch protection —
# enforce_admins is off; the PAT is an org-admin/owner). See CLAUDE.md §3.6.
#
# Idempotent + loop-safe: no-op if the version's tag already exists; skips its own changelog commit.
name: Release

on:
  push:
    branches:
      - main
  # Manual trigger — needed to KICK the FIRST crates.io publish: GitHub does not
  # fire a `push: main` workflow on the squash-merge that first adds the workflow
  # itself, and re-runs skip once a version is already tagged/published.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Changelog + tag
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve version + skip if already tagged
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          pkg() { [ -f package.json ] && jq -r '.version // ""' package.json 2>/dev/null || echo ""; }
          crg() {
            [ -f Cargo.toml ] || { echo ""; return; }
            python3 -c 'import tomllib; d=tomllib.load(open("Cargo.toml","rb")); v=d.get("package",{}).get("version") or d.get("workspace",{}).get("package",{}).get("version") or ""; print(v if isinstance(v,str) else "")' 2>/dev/null || echo ""
          }
          PV="$(pkg)"; CV="$(crg)"; VER="${PV:-$CV}"
          if [ -z "$VER" ]; then echo "skip=true" >>"$GITHUB_OUTPUT"; echo "No version file — nothing to release."; exit 0; fi
          TAG="v$VER"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null \
             || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "skip=true" >>"$GITHUB_OUTPUT"; echo "Tag $TAG already exists — no-op."; exit 0
          fi
          echo "skip=false" >>"$GITHUB_OUTPUT"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Install git-cliff
        if: steps.ver.outputs.skip == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        if: steps.ver.outputs.skip == 'false'
        run: git-cliff --config cliff.toml --tag "${{ steps.ver.outputs.tag }}" --output CHANGELOG.md

      - name: Commit changelog, tag, push
        if: steps.ver.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "dig-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add CHANGELOG.md
          # `chore(release):` prefix so this workflow skips its own push (loop guard above).
          git commit -m "chore(release): ${{ steps.ver.outputs.tag }}" || echo "changelog unchanged"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "HEAD:main"
          git push origin "${{ steps.ver.outputs.tag }}"
          echo "Pushed changelog commit + ${{ steps.ver.outputs.tag }} — deploy-on-tag will fire."

  # Publish the workspace's member crates to crates.io in TOPOLOGICAL (bottom-up)
  # order — a crate cannot publish before its dependencies are indexed. Runs after
  # the changelog+tag job (so the release commit is the one published), and on a
  # manual dispatch (first-publish kick). Idempotent: a crate whose version is
  # already on crates.io is skipped, so a re-run after a partial failure resumes.
  #
  # `--no-verify` skips cargo's redundant isolated verify build: the full workspace
  # is already built + tested on every PR by ci.yml (the real gate), and an isolated
  # verify would need the guest wasm embedded by dig-capsule-stage's build.rs and the
  # RISC0 toolchain for the guest — neither of which the publish runner has. crates.io
  # still validates that every dependency exists at publish time, so ORDER is enforced.
  publish-crates:
    name: Publish crates to crates.io
    needs: release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Publish members bottom-up (idempotent, waits for indexing)
        shell: bash
        run: |
          set -euo pipefail

          # crate name -> manifest path. `dig-capsule-guest-risc0` is the excluded
          # RISC0 guest (an optional dep of dig-capsule-prover), published before it
          # so crates.io can resolve the optional dependency.
          declare -a ORDER=(
            "dig-capsule-core:crates/dig-capsule-core/Cargo.toml"
            "dig-capsule-chunker:crates/dig-capsule-chunker/Cargo.toml"
            "dig-capsule-crypto:crates/dig-capsule-crypto/Cargo.toml"
            "dig-capsule-guest:crates/dig-capsule-guest/Cargo.toml"
            "dig-capsule-guest-risc0:crates/dig-capsule-prover/guest/Cargo.toml"
            "dig-capsule-store:crates/dig-capsule-store/Cargo.toml"
            "dig-capsule-prover:crates/dig-capsule-prover/Cargo.toml"
            "dig-capsule-host:crates/dig-capsule-host/Cargo.toml"
            "dig-capsule-compiler:crates/dig-capsule-compiler/Cargo.toml"
            "dig-capsule-stage:crates/dig-capsule-stage/Cargo.toml"
          )

          crate_version() {
            python3 -c 'import sys,tomllib; d=tomllib.load(open(sys.argv[1],"rb")); p=d.get("package",{}); v=p.get("version"); v=(tomllib.load(open("Cargo.toml","rb"))["workspace"]["package"]["version"] if (isinstance(v,dict) or v is None) else v); print(v)' "$1"
          }

          already_published() { # name version -> 0 if present on crates.io
            local n="$1" v="$2"
            curl -sf "https://crates.io/api/v1/crates/${n}/${v}" >/dev/null 2>&1
          }

          wait_indexed() {
            local n="$1" v="$2"
            for _ in $(seq 1 60); do
              if already_published "$n" "$v"; then echo "  indexed: $n $v"; return 0; fi
              sleep 10
            done
            echo "::error::timed out waiting for $n $v to index on crates.io"; return 1
          }

          for entry in "${ORDER[@]}"; do
            name="${entry%%:*}"; manifest="${entry#*:}"
            ver="$(crate_version "$manifest")"
            if already_published "$name" "$ver"; then
              echo "SKIP $name $ver (already on crates.io)"
              continue
            fi
            echo "PUBLISH $name $ver"
            cargo publish --manifest-path "$manifest" --no-verify
            wait_indexed "$name" "$ver"
          done
          echo "All member crates published."
