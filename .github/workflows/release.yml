# On merge to the default branch: regenerate CHANGELOG.md from Conventional Commits (git-cliff),
# commit it to the default branch, THEN tag that commit vX.Y.Z and push the tag. The changelog is
# therefore INCLUDED in the tag. The pushed tag triggers this repo's deploy/release workflow
# (wired `on: push: tags: ['v*']`).
#
# The tag is pushed with RELEASE_TOKEN (a PAT) — a tag pushed by the default GITHUB_TOKEN does NOT
# trigger downstream workflows (GitHub anti-recursion), which would break deploy-on-tag. The same
# PAT pushes the changelog commit (its identity must be allowed past branch protection —
# enforce_admins is off; the PAT is an org-admin/owner). See CLAUDE.md §3.6.
#
# Idempotent + loop-safe: no-op if the version's tag already exists; skips its own changelog commit.
name: Release

on:
  push:
    branches:
      - main
  # Manual trigger — needed to KICK the FIRST crates.io publish: GitHub does not
  # fire a `push: main` workflow on the squash-merge that first adds the workflow
  # itself, and re-runs skip once a version is already tagged/published.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Changelog + tag
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve version + skip if already tagged
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          pkg() { [ -f package.json ] && jq -r '.version // ""' package.json 2>/dev/null || echo ""; }
          crg() {
            [ -f Cargo.toml ] || { echo ""; return; }
            python3 -c 'import tomllib; d=tomllib.load(open("Cargo.toml","rb")); v=d.get("package",{}).get("version") or d.get("workspace",{}).get("package",{}).get("version") or ""; print(v if isinstance(v,str) else "")' 2>/dev/null || echo ""
          }
          PV="$(pkg)"; CV="$(crg)"; VER="${PV:-$CV}"
          if [ -z "$VER" ]; then echo "skip=true" >>"$GITHUB_OUTPUT"; echo "No version file — nothing to release."; exit 0; fi
          TAG="v$VER"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null \
             || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "skip=true" >>"$GITHUB_OUTPUT"; echo "Tag $TAG already exists — no-op."; exit 0
          fi
          echo "skip=false" >>"$GITHUB_OUTPUT"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Install git-cliff
        if: steps.ver.outputs.skip == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        if: steps.ver.outputs.skip == 'false'
        run: git-cliff --config cliff.toml --tag "${{ steps.ver.outputs.tag }}" --output CHANGELOG.md

      - name: Commit changelog, tag, push
        if: steps.ver.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "dig-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add CHANGELOG.md
          # `chore(release):` prefix so this workflow skips its own push (loop guard above).
          git commit -m "chore(release): ${{ steps.ver.outputs.tag }}" || echo "changelog unchanged"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "HEAD:main"
          git push origin "${{ steps.ver.outputs.tag }}"
          echo "Pushed changelog commit + ${{ steps.ver.outputs.tag }} — deploy-on-tag will fire."

  # Publish the single `dig-capsule` crate to crates.io. Runs after the changelog+tag
  # job (so the release commit is the one published), and on a manual dispatch
  # (first-publish kick). Idempotent: a no-op if the crate's version is already on
  # crates.io, so a re-run after a partial failure is safe.
  #
  # `--no-verify` skips cargo's redundant isolated verify build: the whole crate is
  # already built + tested on every PR by ci.yml (the real gate), and an isolated
  # verify would need the guest wasm embedded by build.rs and the RISC0 toolchain for
  # the nested guest — neither of which the publish runner has. crates.io still
  # validates that every dependency exists at publish time.
  publish-crates:
    name: Publish crates to crates.io
    needs: release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Publish dig-capsule (idempotent, waits for indexing)
        shell: bash
        run: |
          set -euo pipefail

          VER="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml","rb"))["package"]["version"])')"

          already_published() { # name version -> 0 if present on crates.io
            local n="$1" v="$2"
            # crates.io 403s the default curl User-Agent — send a descriptive one.
            curl -sf -H "User-Agent: dig-capsule-release (github.com/DIG-Network)" \
              "https://crates.io/api/v1/crates/${n}/${v}" >/dev/null 2>&1
          }

          wait_indexed() {
            local n="$1" v="$2"
            for _ in $(seq 1 180); do
              if already_published "$n" "$v"; then echo "  indexed: $n $v"; return 0; fi
              sleep 10
            done
            echo "::error::timed out after 30 min waiting for $n $v to index on crates.io"; return 1
          }

          if already_published "dig-capsule" "$VER"; then
            echo "SKIP dig-capsule $VER (already on crates.io)"
            exit 0
          fi
          echo "PUBLISH dig-capsule $VER"
          cargo publish --no-verify
          wait_indexed "dig-capsule" "$VER"
          echo "Published dig-capsule $VER."
