name: publish-npm

# Publish the capsule read-crypto WASM as @dignetwork/dig-capsule-wasm. Assembles a
# DUAL-TARGET package (wasm-bindgen `web` ESM + `nodejs` CommonJS) via
# crates/dig-client-wasm's build:pkg, so it imports cleanly in BOTH a browser
# bundler (Vite/webpack) AND a Node.js service, then publishes the assembled
# ./pkg. Auth uses npm OIDC trusted publishing (no NPM_TOKEN): the job's
# id-token is exchanged for a short-lived publish credential by npm >= 11.5.1.
# Runs when a vX.Y.Z tag is pushed (release.yml) or on manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: build wasm + npm publish
    runs-on: ubuntu-latest
    # OIDC trusted publishing needs a writable id-token; contents:read to checkout.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: crates/dig-client-wasm
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing requires npm >= 11.5.1; setup-node ships an older npm.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Assemble the dual-target package (web + node -> pkg/)
        run: npm run build:pkg

      - name: Verify the assembled package end-to-end
        run: |
          cargo run --example gen_smoke_fixture > smoke_fixture.json
          node scripts/verify-pkg.mjs

      # Trusted publishing: npm authenticates via the OIDC id-token — no NODE_AUTH_TOKEN.
      - name: Publish to npmjs
        run: npm publish ./pkg --access public
