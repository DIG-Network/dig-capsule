name: CI

# Quality gates for the lifted `.dig` store DATA PLANE (epic #744): format, lint
# (deny warnings), build + test on Linux + Windows, an >=80% line-coverage gate
# (CLAUDE.md §2.3), and the dual-target `@dignetwork/dig-capsule-wasm` wasm package
# (Node CommonJS + browser ESM) with a Node smoke test AND a real headless-browser
# test. Runs on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # target/ is dominated by wasmtime/cranelift debug symbols; strip debuginfo in
  # CI so the runner disk survives (behaviour identical; backtraces keep names).
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup show
          rustc --version && cargo --version

      # The whole crate graph pulls in wasmtime/cranelift; reclaim the large
      # preinstalled SDKs so the build does not overrun the ubuntu runner disk.
      - name: Free disk space (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache \
            /usr/local/share/boost /usr/share/swift /usr/local/share/powershell \
            /usr/local/lib/node_modules /usr/local/share/chromium \
            /usr/local/graalvm "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune --all --force || true

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # The stage/compiler engines embed the REAL guest wasm (BINDING contract
      # D6), so the wasm32 guest must be built before anything that compiles them.
      # The guest is the same crate compiled under the `guest-wasm` feature to
      # wasm32 (emits target/wasm32-unknown-unknown/release/dig_capsule.wasm),
      # which build.rs embeds into the native serve engine.
      - name: Build guest wasm (required by build.rs guest embed)
        run: cargo build --no-default-features --features guest-wasm --target wasm32-unknown-unknown --release

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: >
          cargo clippy --all-targets --
          -D warnings
          -A clippy::default_constructed_unit_structs
          -A clippy::field_reassign_with_default

      - name: Build
        run: cargo build

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test (nextest, flaky-aware)
        run: cargo nextest run --retries 2

      - name: Doctests
        run: cargo test --doc

  coverage:
    name: Coverage (>=80% lines, gated)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain (+ llvm-tools)
        run: rustup component add llvm-tools-preview

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache || true

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ubuntu-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cov-

      - name: Install cargo-llvm-cov + nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: Build guest wasm (required by build.rs guest embed)
        run: cargo build --no-default-features --features guest-wasm --target wasm32-unknown-unknown --release

      # Gate the pure data-plane logic. The wasmtime host glue and the RISC0
      # backend are exercised by integration tests, not unit-counted here.
      # `--ignore-filename-regex` drops build.rs + the src/imp/guest/ ABI shim
      # from the denominator. Exclude `module_validates_and_exports_full_abi`:
      # it shells out to a nested `cargo build --target wasm32` that inherits
      # llvm-cov's coverage RUSTFLAGS and fails under instrumentation. It still
      # gates in the `test` job (both OS); it measures build/ABI shape, not logic.
      - name: Coverage (>=80% line gate)
        run: >
          cargo llvm-cov nextest
          --ignore-filename-regex '(build\.rs|guest/)'
          --fail-under-lines 80 --retries 2
          -E 'not test(module_validates_and_exports_full_abi)'

  risc0:
    name: risc0 (execution proofs)
    runs-on: ubuntu-latest
    env:
      # Real code path (build env -> guest exec -> journal decode -> receipt
      # verify) but the fast dev receipt, so the roundtrip + 3 FAIL cases run in
      # seconds instead of minutes of real proving.
      RISC0_DEV_MODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup show
          rustc --version && cargo --version
          rustup target add wasm32-unknown-unknown

      # The RISC0 backend still builds under the crate's default features, which
      # include `compile` -> build.rs embeds the wasm32 guest (BINDING contract
      # D6), so build it before anything that compiles the serve engine.
      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache \
            /usr/local/share/boost /usr/share/swift /usr/local/share/powershell \
            /usr/local/lib/node_modules /usr/local/share/chromium \
            /usr/local/graalvm "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune --all --force || true

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ubuntu-risc0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-risc0-

      # Install the RISC0 toolchain (rzup manages the guest rust toolchain +
      # r0vm). The guest ELF is built by build.rs job (c) via risc0-build's
      # embed_methods(), which needs this toolchain on PATH.
      - name: Install RISC0 toolchain (rzup)
        shell: bash
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install rust 1.85.0
          "$HOME/.risc0/bin/rzup" install r0vm 1.2.6
          "$HOME/.risc0/bin/rzup" install cpp || true

      - name: Build guest wasm (required by build.rs guest embed under default features)
        run: cargo build --no-default-features --features guest-wasm --target wasm32-unknown-unknown --release

      - name: Build (risc0 feature)
        run: cargo build --features risc0

      # Actually EXECUTE the real prove->verify roundtrip + the 3 FAIL cases (dev
      # mode). These tests are un-ignored, so a plain test run runs them.
      - name: Test (risc0 feature — real prove/verify roundtrip)
        run: cargo test --features risc0 imp::prover::tests::risc0 -- --nocapture

  wasm-package:
    name: "@dignetwork/dig-capsule-wasm (dual-target wasm)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install wasm-pack (official installer)
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      # The `wasm` read-crypto surface is the crate compiled with only the browser
      # feature set to wasm32 — lint it exactly as it ships (no `full` defaults,
      # which would pull wasmtime/blst that do not compile to wasm32).
      - name: Clippy (wasm read-crypto surface, deny warnings)
        run: cargo clippy --no-default-features --features wasm --target wasm32-unknown-unknown -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # §7 byte-parity gate: the native parity + public-manifest tests prove the
      # wasm read-crypto exports match the host crypto byte-for-byte.
      - name: Parity tests (native, wasm surface; flaky-aware)
        run: cargo nextest run --no-default-features --features crypto,wasm --retries 2

      - name: Build + assemble the dual-target package (web + node -> pkg/)
        working-directory: wasm-npm
        run: npm run build:pkg

      - name: Generate real-crypto smoke fixture
        run: cargo run --manifest-path Cargo.toml --no-default-features --features crypto,wasm --example gen_smoke_fixture > wasm-npm/smoke_fixture.json

      - name: Node test — verify assembled package end-to-end
        working-directory: wasm-npm
        run: node scripts/verify-pkg.mjs

      - name: Real-browser test (headless Chrome)
        run: wasm-pack test --headless --chrome --test browser -- --no-default-features --features wasm
